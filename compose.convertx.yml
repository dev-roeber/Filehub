services:
  convertx:
    image: ghcr.io/c4illin/convertx:latest
    container_name: filehub-convertx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CONVERTX_PORT:-3000}:3000"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      JWT_SECRET: ${CONVERTX_JWT_SECRET}
      ACCOUNT_REGISTRATION: ${ACCOUNT_REGISTRATION:-false}
      ALLOW_UNAUTHENTICATED: ${CONVERTX_ALLOW_UNAUTHENTICATED:-false}
      HTTP_ALLOWED: ${CONVERTX_HTTP_ALLOWED:-true}
      AUTO_DELETE_EVERY_N_HOURS: ${CONVERTX_AUTO_DELETE_EVERY_N_HOURS:-24}
      HIDE_HISTORY: ${CONVERTX_HIDE_HISTORY:-false}
      LANGUAGE: ${CONVERTX_LANGUAGE:-de}
      FFMPEG_ARGS: ${CONVERTX_FFMPEG_ARGS:--preset veryfast}
      MAX_CONVERT_PROCESS: "2"
    volumes:
      - ./data/convertx:/app/data
    networks:
      - filehub_net
    cpus: "2.0"
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
