services:
  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filehub-filebrowser
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FILEBROWSER_PORT:-3003}:80"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      FB_BASEURL: ""
    volumes:
      - ./data/filebrowser/database:/database
      - ./config/filebrowser:/config
      - ./data/filebrowser/root:/srv
      - ./data/paperless/consume:/srv/paperless-consume
      - ./data/stirling/work:/srv/pdf-work
    networks:
      - filehub_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- -T 5 http://localhost:80/health >/dev/null 2>&1 || wget -qO- -T 5 http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: filehub-stirling-pdf
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STIRLING_PDF_PORT:-3004}:8080"
    env_file:
      - .secrets/stirling-pdf.env
    environment:
      TZ: ${TZ:-Europe/Berlin}
      SYSTEM_DEFAULTLOCALE: de-DE
      UI_APPNAME: Filehub PDF
      UI_APPNAMENAVBAR: Filehub PDF
      SECURITY_ENABLELOGIN: "true"
      DISABLE_ADDITIONAL_FEATURES: "false"
      LANGS: de_DE,en_US
    volumes:
      - ./data/stirling/trainingData:/usr/share/tessdata
      - ./data/stirling/extraConfigs:/configs
      - ./data/stirling/customFiles:/customFiles
      - ./data/stirling/logs:/logs
      - ./data/stirling/pipeline:/pipeline
      - ./data/stirling/work:/tmp/filehub-pdf-work
    networks:
      - filehub_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/ | grep -qE '^(200|302|401)$' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
