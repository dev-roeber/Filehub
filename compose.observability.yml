services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: filehub-dozzle
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DOZZLE_PORT:-9999}:8080"
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_ENABLE_ACTIONS: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - filehub_net
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: filehub-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT:-3002}:3001"
    volumes:
      - ./data/uptime-kuma:/app/data
    networks:
      - filehub_net
    healthcheck:
      test: ["CMD-SHELL", "node extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: filehub-homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOMEPAGE_PORT:-3001}:3000"
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost,127.0.0.1
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - filehub_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
