# Dependabot-Konfiguration fuer Filehub.
#
# Hinweis: Dependabot ist hier vorbereitet, aber im Repo-Setting noch NICHT aktiviert.
# Image-Tags/Digests in den Compose-Files werden bewusst nicht gepinnt
# (vgl. zurueckgestellter Punkt zum Image-Pinning).
version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker):"

