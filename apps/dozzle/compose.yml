# Dozzle (Docker-Log-Viewer) - eigenstaendige Compose-Definition.
# Bestehende compose.observability.yml im Repo-Root bleibt parallel kompatibel.
# Aufruf:  docker compose --env-file ../../.env -f compose.yml up -d

name: filehub

networks:
  filehub_net:
    name: filehub_net
    external: true

services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: filehub-dozzle
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DOZZLE_PORT:-9999}:8080"
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_ENABLE_ACTIONS: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - filehub_net
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
