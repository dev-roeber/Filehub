global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['filehub-node-exporter:9100']
        labels:
          host: filehub

  - job_name: cadvisor
    static_configs:
      - targets: ['filehub-cadvisor:8080']
        labels:
          host: filehub
